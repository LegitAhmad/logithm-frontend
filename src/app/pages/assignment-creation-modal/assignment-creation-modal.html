<div class="fixed inset-0 z-[9999] flex items-center justify-center bg-black/50 backdrop-blur-xl p-4 md:p-8" (click)="onCancel()">
  
  <div class="w-full max-w-5xl bg-white/[0.03] border border-white/10 rounded-[2.5rem] p-8 md:p-10 shadow-2xl relative flex flex-col animate-in fade-in duration-500" (click)="$event.stopPropagation()">
    
    <div class="mb-8">
      <h2 class="text-primary text-3xl font-extrabold tracking-tight">Create New Assignment</h2>
      <p class="text-white/30 text-[11px] uppercase tracking-[0.4em] font-bold mt-1">Academic Management System</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-10 gap-8 items-start">
      
      <div class="md:col-span-6 space-y-6">
        <div class="space-y-2 text-left">
          <label class="text-[10px] font-bold text-white/30 uppercase tracking-widest ml-1">Assignment Title</label>
          <input type="text" 
            [ngModel]="assignmentName()" 
            (ngModelChange)="assignmentName.set($event)"
            placeholder="e.g. Lab Report 01: OOP Fundamentals"
            class="w-full bg-bg1 border border-white/10 rounded-2xl px-6 py-4 text-sm text-white focus:outline-none focus:border-primary/50 hover:border-primary/50 transition-all shadow-inner" />
        </div>

        <div class="p-6 bg-primary/5 rounded-[2rem] border border-white/5">
            <p class="text-[11px] text-gray-400 italic leading-relaxed">
                * This assignment will be visible to all students enrolled in this course once created.
            </p>
        </div>
      </div>

      <div class="md:col-span-4 bg-white/[0.03] p-8 rounded-[2.5rem] border border-white/10 flex flex-col gap-6 shadow-xl">
        <div class="space-y-2 text-left">
          <label class="text-[10px] font-bold text-white/30 uppercase tracking-widest ml-1">Due Date</label>
          <input type="date" 
            (change)="dueDate.set($any($event.target).value)"
            class="w-full bg-bg1 border border-white/10 rounded-xl px-5 py-3.5 text-xs text-white focus:border-primary/40 hover:border-primary/40 outline-none appearance-none" />
        </div>

        <div class="bg-primary/[0.03] border border-primary/20 rounded-2xl p-6 text-center shadow-lg">
          <label class="text-[9px] font-bold text-white/20 uppercase tracking-[0.2em] mb-2 block">Deadline Status</label>
          <div class="text-primary text-xl font-black tracking-tighter uppercase">
             {{ dueDate() ? 'Set' : 'Waiting...' }}
          </div>
        </div>
      </div>
    </div>

    <div class="mt-10 flex justify-end gap-5 pt-8 border-t border-white/5 shrink-0">
      <button (click)="onCancel()" class="px-8 py-3 text-xs font-bold text-white/30 hover:text-white transition-all uppercase tracking-widest cursor-pointer">
        Cancel
      </button>
      <button (click)="onCreate()" 
        class="px-10 py-3.5 rounded-full bg-primary text-bg1 text-xs font-black uppercase tracking-widest hover:scale-[1.02] active:scale-[0.98] transition-all shadow-lg shadow-primary/20 cursor-pointer">
        Create Assignment
      </button>
    </div>
  </div>
</div>
