<div class="fixed inset-0 z-[9999] flex items-center justify-center bg-black/50 backdrop-blur-xl p-4 md:p-8" (click)="onCancel()">
  
  <div class="w-full max-w-5xl max-h-[92vh] bg-white/[0.03] border border-white/10 rounded-[2.5rem] p-8 md:p-10 shadow-2xl relative flex flex-col animate-in fade-in duration-500" (click)="$event.stopPropagation()">
    
    <div class="mb-6">
      <h2 class="text-primary text-3xl font-extrabold tracking-tight">Create New Course</h2>
      <p class="text-white/40 text-[11px] uppercase tracking-[0.4em] font-bold mt-1">Academic Management System</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-10 gap-8 items-start flex-1">
      
      <div class="md:col-span-6 space-y-6">
        <div class="grid grid-cols-1 gap-5">
          <div class="space-y-1.5 text-left">
            <label class="text-[10px] font-bold text-white/30 uppercase tracking-widest ml-1">Course Name</label>
            <input type="text" placeholder="e.g. Programming Fundamentals"
              class="w-full bg-bg1 border border-white/10 rounded-2xl px-6 py-3.5 text-sm text-white focus:outline-none focus:border-primary/50 hover:border-primary/50 transition-all shadow-inner" />
          </div>

          <div class="space-y-1.5 text-left">
            <label class="text-[10px] font-bold text-white/30 uppercase tracking-widest ml-1">Instructor Name</label>
            <input type="text" placeholder="e.g. Samyan Wahla"
              class="w-full bg-bg1 border border-white/10 rounded-2xl px-6 py-3.5 text-sm text-white focus:outline-none focus:border-primary/50 hover:border-primary/50 transition-all shadow-inner" />
          </div>
        </div>

        <div class="space-y-2 relative text-left">
  <label class="text-[10px] font-bold text-primary uppercase tracking-widest ml-1">Share Access</label>
  
  <div class="h-[140px] w-full bg-bg1 border border-white/10 rounded-[2rem] focus-within:border-primary/50 transition-all relative shadow-inner overflow-hidden">
    
    <div class="h-full w-full p-5 py-4 pr-3 flex flex-wrap gap-2.5 content-start overflow-y-auto custom-scrollbar">
      @for (person of selectedPeople(); track person.email) {
        <div class="flex items-center gap-2 bg-primary/10 border border-primary/20 pl-2 pr-3 py-1 rounded-full animate-in zoom-in">
          <div class="w-5 h-5 bg-primary/20 rounded-full flex items-center justify-center text-[9px] font-bold text-primary">{{ person.initial }}</div>
          <span class="text-xs text-primary font-medium">{{ person.email }}</span>
          <button (click)="removeUser(person.email)" class="text-primary/40 hover:text-primary transition-colors cursor-pointer">&times;</button>
        </div>
      }

      <input type="text" [ngModel]="searchQuery()" (ngModelChange)="searchQuery.set($event)" (keydown)="handleKeyboard($event)"
        placeholder="Search email..."
        class="flex-1 bg-transparent border-none outline-none text-sm text-white min-w-[120px] py-1 placeholder:text-white/20" />
    </div>
  </div>

  @if (filteredSuggestions().length > 0) {
    <div class="absolute left-0 top-full mt-2 w-full max-h-[180px] overflow-y-auto bg-[#161616] border border-white/10 rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.8)] z-[999] py-1 animate-in slide-in-from-top-2 duration-300 backdrop-blur-3xl custom-scrollbar">
      @for (user of filteredSuggestions(); track user.email; let i = $index) {
        <button (click)="selectUser(user)" 
          [class.bg-white/10]="i === activeSelectionIndex()"
          class="w-full px-5 py-3 flex items-center gap-4 hover:bg-white/5 text-left transition-colors">
          <div class="w-7 h-7 bg-white/10 rounded-lg flex items-center justify-center font-bold text-primary text-xs">{{ user.initial }}</div>
          <span class="text-sm text-white font-medium">{{ user.email }}</span>
        </button>
      }
    </div>
  }
</div>
      </div>

      <div class="md:col-span-4 bg-white/[0.03] p-7 rounded-[2.5rem] border border-white/10 flex flex-col justify-between shadow-xl">
        <div class="space-y-5 text-left">
          <div class="space-y-1.5">
            <label class="text-[10px] font-bold text-white/30 uppercase tracking-widest ml-1">Start Date</label>
            <input type="date" (change)="startDate.set($any($event.target).value)"
              class="w-full bg-bg1 border border-white/10 rounded-xl px-5 py-2.5 text-xs text-white focus:border-primary/40 hover:border-primary/40 outline-none appearance-none" />
          </div>
          <div class="space-y-1.5">
            <label class="text-[10px] font-bold text-white/30 uppercase tracking-widest ml-1">End Date</label>
            <input type="date" (change)="endDate.set($any($event.target).value)"
              class="w-full bg-bg1 border border-white/10 rounded-xl px-5 py-2.5 text-xs text-white focus:border-primary/40 hover:border-primary/40 outline-none appearance-none" />
          </div>
        </div>

        <div class="bg-primary/[0.03] border border-primary/20 rounded-2xl p-5 text-center mt-4">
          <label class="text-[9px] font-bold text-white/20 uppercase tracking-[0.2em] mb-1 block">Duration</label>
          <div class="text-primary text-2xl font-black tracking-tighter">
             {{ duration() }}
          </div>
        </div>
      </div>
    </div>

    <div class="mt-8 flex justify-end gap-5 pt-6 border-t border-white/5 shrink-0">
      <button (click)="onCancel()" class="px-8 py-3 text-xs font-bold text-white/30 hover:text-white transition-all uppercase tracking-widest cursor-pointer">Cancel</button>
      <button class="px-10 py-3.5 rounded-full bg-primary text-bg1 text-xs font-black uppercase tracking-widest hover:scale-[1.02] active:scale-[0.98] transition-all shadow-lg shadow-primary/20 cursor-pointer">
        Create Course
      </button>
    </div>
  </div>
</div>
